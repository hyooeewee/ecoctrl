name: Cleanup

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  packages: write
  contents: write

jobs:
  cleanup-images:
    name: Clean old images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [web, admin, server, builder]

    steps:
      - name: Delete old images for ${{ matrix.image }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE="ecoctrl/${{ matrix.image }}"
          OWNER="${{ github.repository_owner }}"

          echo "Fetching versions for $OWNER/$PACKAGE..."

          # List all versions (default sort: created_at desc, newest first)
          # Extract version id and comma-joined tags as TSV
          TO_DELETE=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/users/$OWNER/packages/container/$PACKAGE/versions?per_page=100" \
            --jq '.[] | [.id, (.metadata.container.tags | join(","))] | @tsv' \
            | awk -F'\t' '
              {
                id = $1
                tags = $2
                # Never delete versions tagged latest
                if (tags ~ /(^|,)latest(,|$)/) next
                # Collect v* versions (exclude -rc to avoid deleting rc images)
                if (tags ~ /(^|,)v[0-9]/ && tags !~ /-rc/) v[++v_count] = id
              }
              END {
                # Delete old v* versions (keep 5 newest)
                if (v_count > 5) {
                  for (i = 6; i <= v_count; i++) print v[i]
                }
              }
            ')

          if [ -z "$TO_DELETE" ]; then
            echo "Nothing to delete for $PACKAGE."
            exit 0
          fi

          echo "$TO_DELETE" | while read -r version_id; do
            echo "Deleting version $version_id"
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/users/$OWNER/packages/container/$PACKAGE/versions/$version_id" \
              || echo "Failed to delete version $version_id (may already be gone)"
          done

          echo "Cleanup complete for $PACKAGE."

  cleanup-releases:
    name: Clean old releases
    runs-on: ubuntu-latest
    needs: cleanup-images

    steps:
      - name: Delete old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          echo "Fetching releases for $OWNER/$REPO..."

          # List releases (default sort: created_at desc, newest first)
          # Skip first 5, delete the rest
          TO_DELETE=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$OWNER/$REPO/releases?per_page=100" \
            --jq '.[5:] | .[].id')

          if [ -z "$TO_DELETE" ]; then
            echo "Nothing to delete."
            exit 0
          fi

          echo "$TO_DELETE" | while read -r release_id; do
            echo "Deleting release $release_id"
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/repos/$OWNER/$REPO/releases/$release_id" \
              || echo "Failed to delete release $release_id"
          done

          echo "Release cleanup complete."

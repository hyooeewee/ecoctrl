name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changeset:
    name: Version Management
    runs-on: ubuntu-latest

    outputs:
      published: ${{ steps.changeset.outputs.published }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: changesets/action@v1
        id: changeset
        with:
          version: pnpm run version
          publish: pnpm run release
          createGithubReleases: false
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug changeset outputs
        run: |
          echo "changeset.published=${{ steps.changeset.outputs.published }}"
          echo "changeset.publishedPackages=${{ steps.changeset.outputs.publishedPackages }}"
          echo "changeset.hasChangesets=${{ steps.changeset.outputs.hasChangesets }}"

      - name: Get version
        id: version
        if: steps.changeset.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./apps/admin/package.json').version")
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Debug version output
        if: always()
        run: |
          echo "version.tag=${{ steps.version.outputs.tag }}"

  deploy:
    name: Build + Deploy + GHCR
    runs-on: ubuntu-latest
    needs: changeset
    if: needs.changeset.outputs.published == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Debug deploy inputs
        run: |
          echo "needs.changeset.published=${{ needs.changeset.outputs.published }}"
          echo "needs.changeset.tag=${{ needs.changeset.outputs.tag }}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Web
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          file: apps/web/Dockerfile
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ needs.changeset.outputs.tag }}
            ghcr.io/${{ github.repository }}/web:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Admin
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          file: apps/admin/Dockerfile
          tags: |
            ghcr.io/${{ github.repository }}/admin:${{ needs.changeset.outputs.tag }}
            ghcr.io/${{ github.repository }}/admin:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Server
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          file: packages/server/Dockerfile
          tags: |
            ghcr.io/${{ github.repository }}/server:${{ needs.changeset.outputs.tag }}
            ghcr.io/${{ github.repository }}/server:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package offline deploy bundle
        run: |
          VERSION="${{ needs.changeset.outputs.tag }}"
          VERSION=${VERSION#v}

          bash scripts/migrate-images.sh docker/compose.yaml --export ./ecoctrl-images.tar --platform linux/amd64

          mkdir -p docker-bundle
          mv ecoctrl-images.tar docker-bundle/
          cp docker/compose.yaml docker-bundle/
          cp scripts/migrate-images.sh docker-bundle/

          cat > docker-bundle/README.txt << EOF
          EcoCtrl Docker Offline Bundle v${VERSION}

          1. Ensure docker and docker compose are installed
          2. Run: bash migrate-images.sh compose.yaml --load ecoctrl-images.tar
          3. Copy .env.local to this directory
          4. Run: docker compose up -d
          EOF

          zip -r "ecoctrl-docker-v${VERSION}.zip" docker-bundle
          rm -rf docker-bundle

      - name: Upload Docker bundle to R2
        run: |
          BUCKET="ecoctrl"
          VERSION="${{ needs.changeset.outputs.tag }}"
          VERSION=${VERSION#v}

          pnpm wrangler r2 object put "$BUCKET/images/v$VERSION/ecoctrl.zip" \
            --file="ecoctrl-docker-v${VERSION}.zip" \
            --content-type="application/zip" \
            --remote

          pnpm wrangler r2 object put "$BUCKET/images/latest/ecoctrl.zip" \
            --file="ecoctrl-docker-v${VERSION}.zip" \
            --content-type="application/zip" \
            --remote

          rm "ecoctrl-docker-v${VERSION}.zip"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release-assets:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: changeset
    if: needs.changeset.outputs.published == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm --filter @ecoctrl/web build

      - name: Build Admin
        run: pnpm --filter @ecoctrl/admin build

      - name: Build Server
        run: pnpm --filter @ecoctrl/server build

      - name: Package artifacts
        run: |
          VERSION="${{ needs.changeset.outputs.tag }}"
          VERSION=${VERSION#v}
          mkdir -p release-assets

          for dir in apps/admin/dist apps/web/build/client packages/server/dist; do
            if [ ! -d "$dir" ]; then
              echo "Error: $dir does not exist. Build may have failed."
              exit 1
            fi
          done

          mkdir -p ecoctrl/admin ecoctrl/web ecoctrl/server
          cp -r apps/admin/dist/. ecoctrl/admin/
          cp -r apps/web/build/client/. ecoctrl/web/
          cp -r packages/server/dist/. ecoctrl/server/
          cp scripts/start.sh ecoctrl/

          cd ecoctrl
          zip -r "../release-assets/admin-v${VERSION}.zip" admin
          zip -r "../release-assets/web-v${VERSION}.zip" web
          zip -r "../release-assets/server-v${VERSION}.zip" server
          cd ..

          zip -r "release-assets/ecoctrl-v${VERSION}.zip" ecoctrl
          rm -rf ecoctrl

      - name: Upload to Cloudflare R2
        run: |
          BUCKET="ecoctrl"
          VERSION="${{ needs.changeset.outputs.tag }}"
          VERSION=${VERSION#v}

          for file in release-assets/*.zip; do
            filename=$(basename "$file")
            latest_name="${filename/-v${VERSION}/}"

            # Versioned path
            pnpm wrangler r2 object put "$BUCKET/releases/v$VERSION/$latest_name" \
              --file="$file" \
              --content-type="application/zip" \
              --remote

            # Latest path (overwrite)
            pnpm wrangler r2 object put "$BUCKET/releases/latest/$latest_name" \
              --file="$file" \
              --content-type="application/zip" \
              --remote

            echo "Uploaded: $filename -> v$VERSION + latest"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate release body
        id: changelog
        run: |
          VERSION="${{ needs.changeset.outputs.tag }}"
          VERSION=${VERSION#v}

          awk '/^## '"$VERSION"'$/{found=1; next} found && /^## /{exit} found' apps/admin/CHANGELOG.md > /tmp/changelog_body.md

          if [ ! -s /tmp/changelog_body.md ]; then
            echo "See the full changelog at https://github.com/hyooeewee/ecoctrl/compare/${VERSION}" > /tmp/changelog_body.md
          fi

          {
            echo "content<<CHANGELOG_EOF"
            cat /tmp/changelog_body.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.changeset.outputs.tag }}
          name: Release ${{ needs.changeset.outputs.tag }}
          body: ${{ steps.changelog.outputs.content }}
          files: release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

# =========================
# 1. Changeset Control
# =========================
jobs:
  changeset:
    name: Changeset Check
    runs-on: ubuntu-latest

    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Release PR
        uses: changesets/action@v1
        with:
          version: pnpm run version
          createGithubReleases: false
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Release State
        id: check
        run: |
          VERSION=$(node -p "require('./apps/admin/package.json').version")
          TAG="v$VERSION"

          MSG=$(git log -1 --pretty=%s)

          if echo "$MSG" | grep -qE "changeset|Version Packages"; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # =========================
  # 2. Build + Deploy + GHCR
  # =========================
  deploy:
    name: Build + Deploy + GHCR
    runs-on: ubuntu-latest
    needs: changeset

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # =========================
      # Tag Strategy
      # =========================
      - name: Compute Image Tag
        id: tag
        run: |
          if [ "${{ needs.changeset.outputs.is_release }}" = "true" ]; then
            echo "tag=v${{ needs.changeset.outputs.version }}" >> $GITHUB_OUTPUT
          else
            SHA=$(git rev-parse --short HEAD)
            echo "tag=sha-$SHA" >> $GITHUB_OUTPUT
          fi

      # =========================
      # Build
      # =========================
      - name: Build Web
        run: pnpm --filter @ecoctrl/web build

      - name: Build Admin
        run: pnpm --filter @ecoctrl/admin build

      - name: Build Server
        run: pnpm --filter @ecoctrl/server build

      - name: Build Docs
        run: pnpm --filter @ecoctrl/docs build

      # =========================
      # Deploy Docs (Cloudflare Pages)
      # =========================
      - name: Deploy Docs
        run: |
          pnpm wrangler pages deploy ./apps/docs/.vitepress/dist \
            --project-name ecoctrl-docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # =========================
      # GHCR Login
      # =========================
      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # =========================
      # Docker Build & Push
      # =========================

      - name: Build & Push Web
        run: |
          docker build -f apps/web/Dockerfile -t ghcr.io/${{ github.repository }}/web:${{ steps.tag.outputs.tag }} .
          docker push ghcr.io/${{ github.repository }}/web:${{ steps.tag.outputs.tag }}

      - name: Build & Push Admin
        run: |
          docker build -f apps/admin/Dockerfile -t ghcr.io/${{ github.repository }}/admin:${{ steps.tag.outputs.tag }} .
          docker push ghcr.io/${{ github.repository }}/admin:${{ steps.tag.outputs.tag }}

      - name: Build & Push Server
        run: |
          docker build -f packages/server/Dockerfile -t ghcr.io/${{ github.repository }}/server:${{ steps.tag.outputs.tag }} .
          docker push ghcr.io/${{ github.repository }}/server:${{ steps.tag.outputs.tag }}

  # =========================
  # 3. GitHub Release (only versioned release)
  # =========================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: changeset
    if: needs.changeset.outputs.is_release == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Package artifacts
        run: |
          VERSION="${{ needs.changeset.outputs.version }}"
          mkdir -p release-assets

          zip -r "release-assets/web-v${VERSION}.zip" apps/web/build/client
          zip -r "release-assets/admin-v${VERSION}.zip" apps/admin/dist
          zip -r "release-assets/docs-v${VERSION}.zip" apps/docs/.vitepress/dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.changeset.outputs.tag }}
          name: Release ${{ needs.changeset.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

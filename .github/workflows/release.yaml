name: Release to GitHub

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changeset:
    name: Changeset Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get original commit message
        id: commit
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: Create Release PR
        uses: changesets/action@v1
        with:
          version: pnpm run version
          createGithubReleases: false
          setupGitUser: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version commit
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          MSG="${{ steps.commit.outputs.message }}"
          echo "Original commit message: $MSG"

          IS_RELEASE=false
          REASON=""

          # 方式1: Merge commit
          if echo "$MSG" | grep -q "^Merge pull request" && echo "$MSG" | grep -q "changeset-release"; then
            IS_RELEASE=true
            REASON="merge commit from changeset-release PR"
          fi

          # 方式2 & 3: Squash merge 或 Rebase merge
          if [ "$IS_RELEASE" = "false" ]; then
            API_URL="https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls"
            echo "Querying associated PRs via GitHub API: $API_URL"

            HTTP_CODE=$(curl -sSL -o /tmp/prs.json -w "%{http_code}" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              "$API_URL" || true)

            if [ "$HTTP_CODE" != "200" ]; then
              echo "Error: GitHub API returned HTTP $HTTP_CODE"
              cat /tmp/prs.json 2>/dev/null || echo "(no response body)"
              exit 1
            fi

            PRS=$(cat /tmp/prs.json)
            echo "Associated PRs response: $PRS"

            if echo "$PRS" | jq -e 'any(.[]; .head.ref | contains("changeset-release"))' >/dev/null 2>&1; then
              IS_RELEASE=true
              REASON="commit linked to changeset-release PR (squash/rebase merge)"
            fi
          fi

          VERSION=$(node -p "require('./apps/admin/package.json').version")
          TAG="v$VERSION"
          echo "Package version: $VERSION, Tag: $TAG"

          if [ "$IS_RELEASE" = "true" ] && git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release."
            IS_RELEASE=false
            REASON="tag $TAG already exists"
          fi

          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release decision: IS_RELEASE=$IS_RELEASE, reason: ${REASON:-not a changeset-release merge}"

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: changeset
    if: needs.changeset.outputs.is_release == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Package artifacts
        run: |
          VERSION="${{ needs.changeset.outputs.version }}"
          mkdir -p release-assets

          for dir in apps/admin/dist apps/web/build/client packages/server/dist; do
            if [ ! -d "$dir" ]; then
              echo "Error: $dir does not exist. Build may have failed."
              exit 1
            fi
          done

          # Stage all artifacts under ecoctrl/ for single-dir packaging
          mkdir -p ecoctrl/admin ecoctrl/web ecoctrl/server
          cp -r apps/admin/dist/. ecoctrl/admin/
          cp -r apps/web/build/client/. ecoctrl/web/
          cp -r packages/server/dist/. ecoctrl/server/
          cp scripts/start.sh ecoctrl/start.sh

          # Build individual packages from inside ecoctrl/ so root becomes admin/, web/, server/
          cd ecoctrl
          zip -r "../release-assets/admin-v${VERSION}.zip" admin
          zip -r "../release-assets/web-v${VERSION}.zip" web
          zip -r "../release-assets/server-v${VERSION}.zip" server
          cd ..

          # Build unified package so root becomes ecoctrl/
          zip -r "release-assets/ecoctrl-all-v${VERSION}.zip" ecoctrl
          rm -rf ecoctrl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.changeset.outputs.tag }}
          name: Release ${{ needs.changeset.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release to GitHub

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  changeset:
    name: Changeset Check
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR
        uses: changesets/action@v1
        with:
          version: pnpm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version commit
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "commit_message=$MSG"

          IS_RELEASE=false
          if echo "$MSG" | grep -q "^Version Packages"; then
            IS_RELEASE=true
          elif echo "$MSG" | grep -q "^Merge pull request" && echo "$MSG" | grep -q "changeset-release"; then
            IS_RELEASE=true
          fi

          VERSION=$(node -p "require('./apps/admin/package.json').version")
          TAG="v$VERSION"

          if [ "$IS_RELEASE" = "true" ] && git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release."
            IS_RELEASE=false
          fi

          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: changeset
    if: needs.changeset.outputs.is_release == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Package artifacts
        run: |
          VERSION="${{ needs.changeset.outputs.version }}"
          mkdir -p release-assets

          for dir in apps/admin/dist apps/web/build/client packages/server/dist; do
            if [ ! -d "$dir" ]; then
              echo "Error: $dir does not exist. Build may have failed."
              exit 1
            fi
          done

          # Stage all artifacts under ecoctrl/ for single-dir packaging
          mkdir -p ecoctrl/admin ecoctrl/web ecoctrl/server
          cp -r apps/admin/dist/. ecoctrl/admin/
          cp -r apps/web/build/client/. ecoctrl/web/
          cp -r packages/server/dist/. ecoctrl/server/
          cp scripts/start.sh ecoctrl/start.sh

          # Build individual packages from inside ecoctrl/ so root becomes admin/, web/, server/
          cd ecoctrl
          zip -r "../release-assets/admin-v${VERSION}.zip" admin
          zip -r "../release-assets/web-v${VERSION}.zip" web
          zip -r "../release-assets/server-v${VERSION}.zip" server
          cd ..

          # Build unified package so root becomes ecoctrl/
          zip -r "release-assets/ecoctrl[all]-v${VERSION}.zip" ecoctrl
          rm -rf ecoctrl

      - name: Create unified git tag
        run: |
          TAG="${{ needs.changeset.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping tag creation."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.changeset.outputs.tag }}
          name: Release ${{ needs.changeset.outputs.tag }}
          files: release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

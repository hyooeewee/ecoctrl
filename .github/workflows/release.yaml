release:
  name: Build Release & Deploy
  runs-on: ubuntu-latest
  needs: changeset
  if: needs.changeset.outputs.is_release == 'true'
  timeout-minutes: 45

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: "pnpm"

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    # =========================
    # Build
    # =========================

    - name: Build Web
      run: pnpm --filter @ecoctrl/web build

    - name: Build Admin
      run: pnpm --filter @ecoctrl/admin build

    - name: Build Docs
      run: pnpm --filter @ecoctrl/docs build

    - name: Build Server
      run: pnpm --filter @ecoctrl/server build

    # =========================
    # Deploy Web
    # =========================

    - name: Deploy Web
      run: |
        pnpm wrangler deploy \
          --name ecoctrl-web \
          --compatibility-date=2026-05-12 \
          --assets=./apps/web/build/client
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    # =========================
    # Deploy Admin
    # =========================

    - name: Deploy Admin
      run: |
        pnpm wrangler deploy \
          --name ecoctrl-admin \
          --compatibility-date=2026-05-12 \
          --assets=./apps/admin/dist
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    # =========================
    # Deploy Docs
    # =========================

    - name: Deploy Docs
      run: |
        pnpm wrangler deploy \
          --name ecoctrl-docs \
          --compatibility-date=2026-05-12 \
          --assets=./apps/docs/.vitepress/dist
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    # =========================
    # Deploy Server Worker
    # =========================

    - name: Deploy Server
      run: |
        pnpm wrangler deploy ./packages/server/dist/index.mjs \
          --name ecoctrl-server \
          --compatibility-date=2026-05-12
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    # =========================
    # Package Release Artifacts
    # =========================

    - name: Package artifacts
      run: |
        VERSION="${{ needs.changeset.outputs.version }}"
        mkdir -p release-assets

        zip -r "release-assets/web-v${VERSION}.zip" apps/web/build/client
        zip -r "release-assets/admin-v${VERSION}.zip" apps/admin/dist
        zip -r "release-assets/docs-v${VERSION}.zip" apps/docs/.vitepress/dist
        zip -r "release-assets/server-v${VERSION}.zip" packages/server/dist

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.changeset.outputs.tag }}
        name: Release ${{ needs.changeset.outputs.tag }}
        generate_release_notes: true
        files: release-assets/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

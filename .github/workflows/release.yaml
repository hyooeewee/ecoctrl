name: Release to GitHub

on:
  push:
    branches: [main]

# Ensure write permissions for creating Releases and updating PRs
permissions:
  contents: write
  pull-requests: write

# Cancel in-progress runs for the same branch
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Required for Changesets to generate accurate changelogs
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Step 1: Create Release Pull Request or push Git Tags
      - name: Create Release PR or Publish Tags
        id: changesets
        uses: changesets/action@v1
        with:
          # Script that updates package.json versions and CHANGELOG
          version: pnpm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create unified version tag
        if: steps.changesets.outputs.published == 'true'
        id: create-tag
        run: |
          PUBLISHED_PKGS='${{ steps.changesets.outputs.publishedPackages }}'
          
          if [ "$PUBLISHED_PKGS" = "[]" ] || [ -z "$PUBLISHED_PKGS" ]; then
            echo "No packages published, skipping tag creation"
            exit 0
          fi
          
          VERSION=$(echo "$PUBLISHED_PKGS" | jq -r '.[0].version')
          TAG_NAME="v${VERSION}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
          git push origin "$TAG_NAME"
          
          echo "release_tag=$TAG_NAME" >> $GITHUB_OUTPUT

      # Step 2: Build packages
      - name: Build packages
        if: steps.changesets.outputs.published == 'true'
        run: pnpm run build

      # Step 3: Package the build output for download
      - name: Package artifacts
        if: steps.changesets.outputs.published == 'true'
        run: |
          mkdir -p release-assets
          
          PUBLISHED_PKGS='${{ steps.changesets.outputs.publishedPackages }}'
          
          echo "$PUBLISHED_PKGS" | jq -c '.[]' 2>/dev/null | while read pkg; do
            if [ -z "$pkg" ]; then continue; fi
            
            pkg_name=$(echo "$pkg" | jq -r '.name')
            pkg_version=$(echo "$pkg" | jq -r '.version')
            pkg_path=$(echo "$pkg_name" | cut -d'/' -f2)
            if [ -z "$pkg_path" ]; then
              pkg_path="$pkg_name"
            fi

            if [ -d "packages/$pkg_path/dist" ]; then
              zip -r "release-assets/${pkg_path}-v${pkg_version}.zip" -j "packages/$pkg_path/dist"/*
            fi
          done

      # Step 4: Attach artifacts to the GitHub Release
      - name: Upload assets to Release
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create-tag.outputs.release_tag }}
          files: release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

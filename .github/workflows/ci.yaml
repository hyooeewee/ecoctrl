name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & Format Check
        run: pnpm check

      - name: Build Web
        run: pnpm --filter @ecoctrl/web build

      - name: Build Admin
        run: pnpm --filter @ecoctrl/admin build

      - name: Build Server
        run: pnpm --filter @ecoctrl/server build

      - name: Build Docs
        run: pnpm --filter @ecoctrl/docs build

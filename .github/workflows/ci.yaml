name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & Format Check
        run: pnpm check

      - name: Build Web
        run: pnpm --filter @ecoctrl/web build

      - name: Build Admin
        run: pnpm --filter @ecoctrl/admin build

      - name: Build Server
        run: pnpm --filter @ecoctrl/server build

      - name: Build Docs
        run: pnpm --filter @ecoctrl/docs build

      - name: Start temporary Postgres
        run: |
          docker run -d --name ci-postgres \
            -e POSTGRES_USER=ecoctrl \
            -e POSTGRES_PASSWORD=ecoctrl_secret \
            -e POSTGRES_DB=ecoctrl \
            -p 5432:5432 postgres:16-alpine
          until docker exec ci-postgres pg_isready -U ecoctrl -d ecoctrl; do sleep 1; done

      - name: Verify migrations are up-to-date
        env:
          DATABASE_URL: postgresql://ecoctrl:ecoctrl_secret@localhost:5432/ecoctrl
        run: |
          cd packages/server
          npx drizzle-kit generate
          if [ -n "$(git status --porcelain drizzle/)" ]; then
            echo "ERROR: Uncommitted drizzle migrations detected."
            echo "Run 'cd packages/server && pnpm db:generate' locally and commit the changes."
            git diff --stat drizzle/
            exit 1
          fi

      - name: Stop temporary Postgres
        if: always()
        run: docker rm -f ci-postgres

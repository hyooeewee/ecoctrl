name: Canary

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

permissions:
  packages: write

concurrency:
  group: canary
  cancel-in-progress: true

jobs:
  canary:
    name: Canary
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Canary images (every push to main) ──
      # Builder is multi-platform (needed by RC arm64 builds).
      # App images are single-platform for speed.
      - name: Build & Push canary images
        uses: docker/bake-action@v5
        with:
          files: ./docker/docker-bake.hcl
          push: true
          set: |
            builder.platform=linux/amd64,linux/arm64
            web.platform=linux/amd64
            admin.platform=linux/amd64
            server.platform=linux/amd64
        env:
          TAG: canary
          REGISTRY: ghcr.io/${{ github.repository }}
          LATEST: "false"

      # NOTE: RC Docker + GitHub pre-release are now handled by Release workflow.
      # Canary only builds the canary tag.

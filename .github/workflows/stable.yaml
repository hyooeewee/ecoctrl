name: Stable

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write
  workflows: write

concurrency:
  group: stable
  cancel-in-progress: true

jobs:
  promote:
    name: Promote to stable
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve rc tag
        id: resolve
        run: |
          TAG=$(git describe --tags --exact-match 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            echo "rc-tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Selected: $TAG"
            exit 0
          fi

          TAG=$(gh release list --limit 5 --json tagName --jq '.[].tagName' | grep -- '-rc$' | head -1)
          if [ -z "$TAG" ]; then
            echo "ERROR: No RC tag detected and no RC prerelease found."
            exit 1
          fi
          echo "rc-tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Auto-detected: $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate rc tag exists
        run: |
          for IMG in web admin server; do
            echo "Checking ghcr.io/${{ github.repository }}/${IMG}:${{ steps.resolve.outputs.rc-tag }}..."
            docker buildx imagetools inspect \
              ghcr.io/${{ github.repository }}/${IMG}:${{ steps.resolve.outputs.rc-tag }} \
              > /dev/null 2>&1 || {
              echo "ERROR: ${{ steps.resolve.outputs.rc-tag }} not found for $IMG"
              exit 1
            }
          done
          echo "All rc images found."

      - name: Extract version from rc tag
        id: version
        run: |
          RAW="${{ steps.resolve.outputs.rc-tag }}"
          VER="${RAW%-rc}"
          VER="${VER#v}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Promote images to stable (v* + latest)
        run: |
          for IMG in web admin server; do
            docker buildx imagetools create \
              -t ghcr.io/${{ github.repository }}/${IMG}:${{ steps.version.outputs.version }} \
              -t ghcr.io/${{ github.repository }}/${IMG}:latest \
              ghcr.io/${{ github.repository }}/${IMG}:${{ steps.resolve.outputs.rc-tag }}
          done

      # ── Offline Docker bundle ──
      - name: Export all images
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Pull project images from GHCR + third-party images
          for IMG in web admin server; do
            docker pull "ghcr.io/${{ github.repository }}/${IMG}:${VERSION}"
          done
          docker pull "postgres:16-alpine"
          docker pull "minio/minio:latest"

          # Save to tar
          docker save -o ecoctrl-images.tar \
            "ghcr.io/${{ github.repository }}/web:${VERSION}" \
            "ghcr.io/${{ github.repository }}/admin:${VERSION}" \
            "ghcr.io/${{ github.repository }}/server:${VERSION}" \
            "postgres:16-alpine" \
            "minio/minio:latest"

          # Package offline bundle
          mkdir -p docker-bundle
          mv ecoctrl-images.tar docker-bundle/
          cp docker/compose.yaml docker-bundle/
          cp scripts/migrate-images.sh docker-bundle/

          {
            echo "EcoCtrl Docker Offline Bundle ${VERSION}"
            echo ""
            echo "1. Ensure docker and docker compose are installed"
            echo "2. Run: bash migrate-images.sh compose.yaml --load ecoctrl-images.tar"
            echo "3. Copy .env.local to this directory"
            echo "4. Run: docker compose up -d"
          } > docker-bundle/README.txt

          zip -r "ecoctrl-docker-v${VERSION}.zip" docker-bundle
          rm -rf docker-bundle

      # ── Upload to R2 ──
      - name: Upload Docker bundle to R2
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 cp "ecoctrl-docker-v${VERSION}.zip" \
            "s3://ecoctrl/images/v${VERSION}/ecoctrl.zip" \
            --endpoint-url "$ENDPOINT"

          aws s3 cp "ecoctrl-docker-v${VERSION}.zip" \
            "s3://ecoctrl/images/latest/ecoctrl.zip" \
            --endpoint-url "$ENDPOINT"

          rm "ecoctrl-docker-v${VERSION}.zip"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── GitHub Release ──
      - name: Generate release body
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          awk '/^## '"$VERSION"'$/{found=1; next} found && /^## /{exit}' apps/admin/CHANGELOG.md > /tmp/changelog_body.md

          if [ ! -s /tmp/changelog_body.md ]; then
            echo "See the full changelog at https://github.com/${{ github.repository }}/compare/${VERSION}" > /tmp/changelog_body.md
          fi

          {
            echo "content<<CHANGELOG_EOF"
            cat /tmp/changelog_body.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create stable git tag and release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --latest \
            --title "Release $TAG" \
            --notes-file /tmp/changelog_body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

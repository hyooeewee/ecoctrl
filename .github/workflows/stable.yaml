name: Stable Release

on:
  workflow_dispatch:
    inputs:
      rc-tag:
        description: "RC tag to promote. Leave empty to auto-detect latest prerelease."
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  promote:
    name: Promote to stable
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve rc tag
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.rc-tag }}" ]; then
            echo "rc-tag=${{ github.event.inputs.rc-tag }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(gh release list --limit 5 --json tagName --jq '.[].tagName' | grep -- '-rc$' | head -1)
            if [ -z "$TAG" ]; then
              echo "ERROR: No rc prerelease found."
              exit 1
            fi
            echo "rc-tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Auto-detected: $TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate rc tag exists
        run: |
          for IMG in web admin server; do
            echo "Checking ghcr.io/${{ github.repository }}/${IMG}:${{ steps.resolve.outputs.rc-tag }}..."
            docker buildx imagetools inspect \
              ghcr.io/${{ github.repository }}/${IMG}:${{ steps.resolve.outputs.rc-tag }} \
              > /dev/null 2>&1 || {
              echo "ERROR: ${{ steps.resolve.outputs.rc-tag }} not found for $IMG"
              exit 1
            }
          done
          echo "All rc images found."

      - name: Extract version from rc tag
        id: version
        run: |
          RAW="${{ steps.resolve.outputs.rc-tag }}"
          VER="${RAW%-rc}"
          VER="${VER#v}"
          echo "version=v${VER}" >> "$GITHUB_OUTPUT"

      - name: Promote images to stable (v* + latest)
        run: |
          for IMG in web admin server; do
            docker buildx imagetools create \
              -t ghcr.io/${{ github.repository }}/${IMG}:${{ steps.version.outputs.version }} \
              -t ghcr.io/${{ github.repository }}/${IMG}:latest \
              ghcr.io/${{ github.repository }}/${IMG}:${{ steps.resolve.outputs.rc-tag }}
          done

      # ── Build source artifacts for GitHub Release ──
      - name: Build Web
        run: pnpm --filter @ecoctrl/web build

      - name: Build Admin
        run: pnpm --filter @ecoctrl/admin build

      - name: Build Server
        run: pnpm --filter @ecoctrl/server build

      - name: Package artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION=${VERSION#v}
          mkdir -p release-assets

          for dir in apps/admin/dist apps/web/build/client packages/server/dist; do
            if [ ! -d "$dir" ]; then
              echo "Error: $dir does not exist."
              exit 1
            fi
          done

          mkdir -p ecoctrl/admin ecoctrl/web ecoctrl/server
          cp -r apps/admin/dist/. ecoctrl/admin/
          cp -r apps/web/build/client/. ecoctrl/web/
          cp -r packages/server/dist/. ecoctrl/server/
          cp scripts/start.mjs ecoctrl/

          cd ecoctrl
          zip -r "../release-assets/admin-v${VERSION}.zip" admin
          zip -r "../release-assets/web-v${VERSION}.zip" web
          zip -r "../release-assets/server-v${VERSION}.zip" server
          cd ..

          zip -r "release-assets/ecoctrl-v${VERSION}.zip" ecoctrl
          rm -rf ecoctrl

      # ── Offline Docker bundle ──
      - name: Package offline deploy bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION=${VERSION#v}

          bash scripts/migrate-images.sh docker/compose.yaml --export ./ecoctrl-images.tar --platform linux/amd64

          mkdir -p docker-bundle
          mv ecoctrl-images.tar docker-bundle/
          cp docker/compose.yaml docker-bundle/
          cp scripts/migrate-images.sh docker-bundle/

          cat > docker-bundle/README.txt << EOF
          EcoCtrl Docker Offline Bundle v${VERSION}

          1. Ensure docker and docker compose are installed
          2. Run: bash migrate-images.sh compose.yaml --load ecoctrl-images.tar
          3. Copy .env.local to this directory
          4. Run: docker compose up -d
          EOF

          zip -r "ecoctrl-docker-v${VERSION}.zip" docker-bundle
          rm -rf docker-bundle

      # ── Upload to R2 ──
      - name: Upload Docker bundle to R2
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION=${VERSION#v}

          ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 cp "ecoctrl-docker-v${VERSION}.zip" \
            "s3://ecoctrl/images/v${VERSION}/ecoctrl.zip" \
            --endpoint-url "$ENDPOINT"

          aws s3 cp "ecoctrl-docker-v${VERSION}.zip" \
            "s3://ecoctrl/images/latest/ecoctrl.zip" \
            --endpoint-url "$ENDPOINT"

          rm "ecoctrl-docker-v${VERSION}.zip"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload source release assets to R2
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION=${VERSION#v}

          for file in release-assets/*.zip; do
            filename=$(basename "$file")
            latest_name="${filename/-v${VERSION}/}"

            pnpm wrangler r2 object put "ecoctrl/releases/v$VERSION/$latest_name" \
              --file="$file" \
              --content-type="application/zip" \
              --remote

            pnpm wrangler r2 object put "ecoctrl/releases/latest/$latest_name" \
              --file="$file" \
              --content-type="application/zip" \
              --remote

            echo "Uploaded: $filename -> v$VERSION + latest"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── GitHub Release ──
      - name: Generate release body
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION=${VERSION#v}

          awk '/^## '"$VERSION"'$/{found=1; next} found && /^## /{exit}' apps/admin/CHANGELOG.md > /tmp/changelog_body.md

          if [ ! -s /tmp/changelog_body.md ]; then
            echo "See the full changelog at https://github.com/${{ github.repository }}/compare/${VERSION}" > /tmp/changelog_body.md
          fi

          {
            echo "content<<CHANGELOG_EOF"
            cat /tmp/changelog_body.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create stable git tag and release
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

          gh release create ${{ steps.version.outputs.version }} \
            --latest \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/changelog_body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          gh release upload ${{ steps.version.outputs.version }} release-assets/*.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

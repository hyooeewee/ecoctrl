name: Stable

on:
  workflow_dispatch:
    inputs:
      rc-tag:
        description: "RC tag to promote. Leave empty to auto-detect latest prerelease."
        required: false
        default: ""

permissions:
  contents: write
  packages: write

concurrency:
  group: stable
  cancel-in-progress: true

jobs:
  promote:
    name: Promote to stable
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve rc tag
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.rc-tag }}" ]; then
            echo "rc-tag=${{ github.event.inputs.rc-tag }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(gh release list --limit 5 --json tagName --jq '.[].tagName' | grep -- '-rc$' | head -1)
            if [ -z "$TAG" ]; then
              echo "ERROR: No rc prerelease found."
              exit 1
            fi
            echo "rc-tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Auto-detected: $TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate rc tag exists
        run: |
          for IMG in web admin server; do
            echo "Checking ghcr.io/${{ github.repository }}/${IMG}:${{ steps.resolve.outputs.rc-tag }}..."
            docker buildx imagetools inspect \
              ghcr.io/${{ github.repository }}/${IMG}:${{ steps.resolve.outputs.rc-tag }} \
              > /dev/null 2>&1 || {
              echo "ERROR: ${{ steps.resolve.outputs.rc-tag }} not found for $IMG"
              exit 1
            }
          done
          echo "All rc images found."

      - name: Extract version from rc tag
        id: version
        run: |
          RAW="${{ steps.resolve.outputs.rc-tag }}"
          VER="${RAW%-rc}"
          VER="${VER#v}"
          echo "version=v${VER}" >> "$GITHUB_OUTPUT"

      - name: Promote images to stable (v* + latest)
        run: |
          for IMG in web admin server; do
            docker buildx imagetools create \
              -t ghcr.io/${{ github.repository }}/${IMG}:${{ steps.version.outputs.version }} \
              -t ghcr.io/${{ github.repository }}/${IMG}:latest \
              ghcr.io/${{ github.repository }}/${IMG}:${{ steps.resolve.outputs.rc-tag }}
          done

      # ── GitHub Release ──
      - name: Generate release body
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION=${VERSION#v}

          awk '/^## '"$VERSION"'$/{found=1; next} found && /^## /{exit}' apps/admin/CHANGELOG.md > /tmp/changelog_body.md

          if [ ! -s /tmp/changelog_body.md ]; then
            echo "See the full changelog at https://github.com/${{ github.repository }}/compare/${VERSION}" > /tmp/changelog_body.md
          fi

          {
            echo "content<<CHANGELOG_EOF"
            cat /tmp/changelog_body.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create stable git tag and release
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

          gh release create ${{ steps.version.outputs.version }} \
            --latest \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/changelog_body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

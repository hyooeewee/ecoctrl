# Production Compose — multi-service orchestration for ecoctrl monorepo
#
# Prerequisites:
#   - Docker Engine 24.0+ & Docker Compose v2+
#   - Each service Dockerfile must handle monorepo workspace dependencies (pnpm workspace:*)
#
# Usage:
#   cd docker && docker compose -f compose.build.yaml up --build
#   # or from repo root:
#   docker compose -f docker/compose.build.yaml up --build
#
# Access:
#   - Web:      http://localhost:8081
#   - Admin:    http://localhost:4173
#   - API:      http://localhost:3000
#   - API Docs: http://localhost:3000/documentation
#   - DB:       localhost:5432

name: ecoctrl

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecoctrl-postgres
    environment:
      POSTGRES_USER: ecoctrl
      POSTGRES_PASSWORD: ecoctrl_secret
      POSTGRES_DB: ecoctrl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoctrl -d ecoctrl"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: packages/server/Dockerfile
    container_name: ecoctrl-migrate
    command: sh -c "cd /app/packages/server && npx drizzle-kit migrate"
    environment:
      - DATABASE_URL=postgresql://ecoctrl:ecoctrl_secret@postgres:5432/ecoctrl
    depends_on:
      postgres:
        condition: service_healthy
    restart: no

  server:
    build:
      context: ..
      dockerfile: packages/server/Dockerfile
    container_name: ecoctrl-server
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://ecoctrl:ecoctrl_secret@postgres:5432/ecoctrl
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/packages/server/dist/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: ecoctrl-web
    environment:
      - API_BASE_URL=http://server:3000
      - API_PREFIX=/api
      - STATIC_PREFIX=/static
    ports:
      - "8081:80"
    depends_on:
      server:
        condition: service_healthy

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    container_name: ecoctrl-admin
    environment:
      - API_BASE_URL=http://server:3000
      - API_PREFIX=/api
      - STATIC_PREFIX=/static
    ports:
      - "4173:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:

name: ecoctrl
services:
  postgres:
    container_name: ecoctrl-postgres
    restart: always
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ecoctrl
      POSTGRES_PASSWORD: ecoctrl_secret
      POSTGRES_DB: ecoctrl
    volumes:
      - ./ecoctrl/postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ecoctrl -d ecoctrl
      interval: 5s
      timeout: 5s
      retries: 5
  minio:

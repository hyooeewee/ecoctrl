      MINIO_ROOT_USER: ecoctrl
      MINIO_ROOT_PASSWORD: ecoctrl_secret
    volumes:
      - ./ecoctrl/minio_data:/data
    ports:
      - 9000:9000
      - 9001:9001
    command: server /data --console-address ":9001"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      interval: 5s
      timeout: 5s
      retries: 5
  server:
    container_name: ecoctrl-server
    restart: always
    environment:
      NODE_ENV: development
      PORT: '3000'
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:whzzdvyk@godot.run:45432/ecoctrl
      STORAGE_PROVIDER: minio
      S3_ENDPOINT: http://godot.run:9000
      S3_ACCESS_KEY: ecoctrl
      S3_SECRET_KEY: ecoctrl_secret
      S3_BUCKET_FILES: ecoctrl-files
      S3_BUCKET_MODELS: ecoctrl-models
      S3_BUCKET_PLUGINS: ecoctrl-plugins
      S3_FORCE_PATH_STYLE: 'true'
      INIT_ADMIN_USERNAME: admin
      INIT_ADMIN_PASSWORD: admin_secret
      INIT_ADMIN_EMAIL: admin@example.com
    ports:
      - 3000:3000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.local
    volumes:
      - ./ecoctrl/server_logs:/app/packages/server/logs
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:3000/health
      interval: 10s

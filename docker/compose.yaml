name: ecoctrl

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecoctrl-postgres
    restart: always
    environment:
      POSTGRES_USER: ecoctrl
      POSTGRES_PASSWORD: ecoctrl_secret
      POSTGRES_DB: ecoctrl
    volumes:
      - ./ecoctrl/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoctrl -d ecoctrl"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/hyooeewee/ecoctrl/server:latest
    container_name: ecoctrl-server
    restart: always
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://ecoctrl:ecoctrl_secret@postgres:5432/ecoctrl
      - STORAGE_PROVIDER=minio
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=ecoctrl
      - S3_SECRET_KEY=ecoctrl_secret
      - S3_FORCE_PATH_STYLE=true
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/hyooeewee/ecoctrl/web:latest
    container_name: ecoctrl-web
    restart: always
    environment:
      - API_BASE_URL=http://server:3000
      - API_PREFIX=/api
      - STATIC_PREFIX=/static
    ports:
      - "8081:80"
    depends_on:
      server:
        condition: service_healthy

  admin:
    image: ghcr.io/hyooeewee/ecoctrl/admin:latest
    container_name: ecoctrl-admin
    restart: always
    environment:
      - API_BASE_URL=http://server:3000
      - API_PREFIX=/api
      - STATIC_PREFIX=/static
    ports:
      - "4173:80"
    depends_on:
      server:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: ecoctrl-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ecoctrl
      MINIO_ROOT_PASSWORD: ecoctrl_secret
    volumes:
      - ./ecoctrl/minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

# Production Compose — multi-service orchestration for ecoctrl monorepo
#
# Prerequisites:
#   - Docker Engine 24.0+ & Docker Compose v2+
#   - Each service Dockerfile must handle monorepo workspace dependencies (pnpm workspace:*)
#
# Usage:
#   cd docker && docker compose up --build
#   # or from repo root:
#   docker compose -f docker/compose.yml up --build
#
# Access:
#   - Web:      http://localhost:8081
#   - Admin:    http://localhost:4173
#   - API:      http://localhost:3000
#   - API Docs: http://localhost:3000/documentation
#   - DB:       localhost:5432

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecoctrl-postgres
    environment:
      POSTGRES_USER: ecoctrl
      POSTGRES_PASSWORD: ecoctrl_secret
      POSTGRES_DB: ecoctrl
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoctrl -d ecoctrl"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: packages/server/Dockerfile
    container_name: ecoctrl-server
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://ecoctrl:ecoctrl_secret@postgres:5432/ecoctrl
      JWT_SECRET: ${JWT_SECRET:-ecoctrl-jwt-secret-change-in-production}
      BASE_URL: ${BASE_URL:-}
      APP_ID: ${APP_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # Passed to Dockerfile as ARG for build-time static replacement.
        # Browser-side code will call http://localhost:3000 for API requests.
        VITE_API_BASE_URL: http://localhost:3000
    container_name: ecoctrl-web
    ports:
      - "8081:80"
    depends_on:
      - server

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    container_name: ecoctrl-admin
    ports:
      - "4173:80"
    depends_on:
      - server

volumes:
  postgres_data:

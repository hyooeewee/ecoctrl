# Development Compose — hot-reload mode for ecoctrl monorepo
#
# This file reuses the production Dockerfiles but overrides the start command
# to run dev servers and mounts the host source code for hot-reload.
#
# Prerequisites for your Dockerfiles:
#   - The final stage must retain devDependencies (or be a multi-stage build
#     where the dev target installs all deps). Otherwise `pnpm dev` will fail.
#
# Usage:
#   cd docker && docker compose -f compose.build.yaml -f compose.dev.yaml up --build
#   # or from repo root:
#   docker compose -f docker/compose.build.yaml -f docker/compose.dev.yaml up --build
#
# Access:
#   - Web:      http://localhost:8080
#   - Admin:    http://localhost:5173   (default Vite dev port)
#   - API:      http://localhost:3000
#   - DB:       localhost:5432

name: ecoctrl

services:
  server:
    command: pnpm --filter @ecoctrl/server dev
    volumes:
      # Mount host source
      - ..:/app
      # Preserve container's installed node_modules (do not overwrite with host)
      - /app/node_modules
      - /app/packages/server/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://ecoctrl:ecoctrl_secret@postgres:5432/ecoctrl
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - INITIAL_ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - STORAGE_PROVIDER=minio
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=ecoctrl
      - S3_SECRET_KEY=ecoctrl_secret
      - S3_FORCE_PATH_STYLE=true
    depends_on:
      minio:
        condition: service_healthy

  web:
    command: pnpm --filter @ecoctrl/web dev
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    env_file:
      # Caddy / dev server reads API_BASE_URL / API_PREFIX / STATIC_PREFIX from this file.
      # For docker network, set API_BASE_URL=http://server:3000 (compose service name).
      - ../apps/web/.env.local
    ports:
      - "8080:8080"

  admin:
    command: pnpm --filter @ecoctrl/admin dev
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/apps/admin/node_modules
    env_file:
      # Caddy / dev server reads API_BASE_URL / API_PREFIX / STATIC_PREFIX from this file.
      # For docker network, set API_BASE_URL=http://server:3000 (compose service name).
      - ../apps/admin/.env.local
    ports:
      # Default Vite dev port. Change if your vp/vite config uses another port.
      - "5173:5173"

  minio:
    image: minio/minio:latest
    container_name: ecoctrl-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ecoctrl
      MINIO_ROOT_PASSWORD: ecoctrl_secret
    volumes:
      - ./ecoctrl/minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

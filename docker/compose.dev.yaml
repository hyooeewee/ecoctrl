# Auto-generated by scripts/generate-compose.py
# Do NOT edit manually.

name: ecoctrl-dev
services:
  postgres:
    container_name: ecoctrl-postgres
    restart: always
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ecoctrl
      POSTGRES_PASSWORD: ecoctrl_secret
      POSTGRES_DB: ecoctrl
    volumes:
      - ./ecoctrl/postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ecoctrl -d ecoctrl
      interval: 5s
      timeout: 5s
      retries: 5
  minio:
    container_name: ecoctrl-minio
    restart: always
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ecoctrl
      MINIO_ROOT_PASSWORD: ecoctrl_secret
    volumes:
      - ./ecoctrl/minio_data:/data
    ports:
      - 9000:9000
      - 9001:9001
    command: server /data --console-address ":9001"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      interval: 5s
      timeout: 5s
      retries: 5
  server:
    container_name: ecoctrl-server
    restart: always
    environment:
      NODE_ENV: development
      PORT: '3001'
      HOST: 0.0.0.0
      DATABASE_URL: '"postgresql://postgres:whzzdvyk@godot.run:45432/ecoctrl"'
      STORAGE_PROVIDER: minio
      S3_ENDPOINT: http://godot.run:9000
      S3_ACCESS_KEY: ecoctrl
      S3_SECRET_KEY: ecoctrl_secret
      S3_BUCKET_FILES: ecoctrl-files
      S3_BUCKET_MODELS: ecoctrl-models
      S3_BUCKET_PLUGINS: ${S3_BUCKET_PLUGINS}
      S3_FORCE_PATH_STYLE: 'true'
      INIT_ADMIN_USERNAME: admin
      INIT_ADMIN_PASSWORD: admin_secret
      INIT_ADMIN_EMAIL: admin@example.com
      PNPM_HOME: /root/.pnpm-store
    ports:
      - 3001:3001
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.local
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/packages/server/node_modules
      - pnpm-store:/root/.pnpm-store
      - ../docker/.env.local:/app/packages/server/.env.local:ro
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:3001/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @ecoctrl/server dev"
  web:
    container_name: ecoctrl-web
    restart: always
    environment:
      API_BASE_URL: http://server:3001
      API_PREFIX: /api
      STATIC_PREFIX: /static
    ports:
      - 8080:8080
    depends_on:
      server:
        condition: service_healthy
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @ecoctrl/web dev"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - pnpm-store:/root/.pnpm-store
  admin:
    container_name: ecoctrl-admin
    restart: always
    environment:
      API_BASE_URL: http://server:3001
      API_PREFIX: /api
      STATIC_PREFIX: /static
    ports:
      - 5173:5173
    depends_on:
      server:
        condition: service_healthy
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @ecoctrl/admin dev"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/apps/admin/node_modules
      - pnpm-store:/root/.pnpm-store
volumes:
  pnpm-store: {}

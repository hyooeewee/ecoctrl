# Base Docker Compose template
# Used by scripts/generate-compose.py to generate compose.yaml, compose.dev.yaml, and compose.build.yaml
# Do NOT edit the generated files directly.

name: ecoctrl
services:
  postgres:
    container_name: ecoctrl-postgres
    restart: always
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./ecoctrl/postgres_data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:5432
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    container_name: ecoctrl-minio
    restart: always
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./ecoctrl/minio_data:/data
    ports:
      - ${MINIO_API_PORT}:9000
      - ${MINIO_CONSOLE_PORT}:9001
    command: server /data --console-address ":9001"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    container_name: ecoctrl-server
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${SERVER_PORT}
      HOST: ${SERVER_HOST}
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      S3_BUCKET_FILES: ${S3_BUCKET_FILES}
      S3_BUCKET_MODELS: ${S3_BUCKET_MODELS}
      S3_BUCKET_PLUGINS: ${S3_BUCKET_PLUGINS}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD}
      INIT_ADMIN_EMAIL: ${INIT_ADMIN_EMAIL}
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.local
    volumes:
      - ./ecoctrl/server_logs:/app/packages/server/logs
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:${SERVER_PORT}/health > /dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    container_name: ecoctrl-web
    restart: always
    environment:
      API_BASE_URL: http://server:${SERVER_PORT}
      API_PREFIX: ${API_PREFIX}
      STATIC_PREFIX: ${STATIC_PREFIX}
    ports:
      - ${WEB_PORT}:80
    depends_on:
      server:
        condition: service_healthy

  admin:
    container_name: ecoctrl-admin
    restart: always
    environment:
      API_BASE_URL: http://server:${SERVER_PORT}
      API_PREFIX: ${API_PREFIX}
      STATIC_PREFIX: ${STATIC_PREFIX}
    ports:
      - ${ADMIN_PORT}:80
    depends_on:
      server:
        condition: service_healthy
